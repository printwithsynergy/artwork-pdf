name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  semgrep:
    name: semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Install semgrep
        run: pip install semgrep

      - name: Semgrep scan (blocking)
        run: |
          semgrep scan --error \
            --config p/security-audit \
            --config p/secrets \
            --config p/javascript \
            --config p/typescript \
            apps/editor/src apps/service/src \
            packages/compose/src packages/dieline-parser/src \
            packages/document-model/src packages/editor-app/src \
            packages/flexo-distortion/src packages/synergy-client/src
