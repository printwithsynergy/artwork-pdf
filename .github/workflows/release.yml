name: release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  publish-npm:
    name: publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build everything first so we never publish one package and
      # then discover the other's tsc errored out mid-release. The
      # `...` syntax pulls in each target's workspace dependencies
      # (dieline-parser, document-model, etc.) so the build sees a
      # populated `dist/` rather than a missing module.
      - name: Build @printwithsynergy/artwork-pdf (+ workspace deps)
        run: pnpm --filter '@printwithsynergy/artwork-pdf...' build

      - name: Build @printwithsynergy/artwork-pdf-editor (+ workspace deps)
        run: pnpm --filter '@printwithsynergy/artwork-pdf-editor...' build

      - name: Publish @printwithsynergy/dieline-parser
        run: pnpm --filter @printwithsynergy/dieline-parser publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @printwithsynergy/artwork-pdf
        run: pnpm --filter @printwithsynergy/artwork-pdf publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @printwithsynergy/artwork-pdf-editor
        run: pnpm --filter @printwithsynergy/artwork-pdf-editor publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "Release ${{ github.ref_name }} — see ARCHITECTURE.md"
